# =============================================================================
# SERVICE REPO — THIN CALLER of the CENTRAL PIPELINE (mbeema/platform-pipelines@v1)
# Repo: mbeema/service-payments  (Function App / zip service)
#
# Every job delegates to the central reusable workflows. build/deploy use the
# POC (dummy) variants; release + bump-ledger are the production reusables.
# Prod is released from platform-releases via prod.json.
# =============================================================================
name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    uses: mbeema/platform-pipelines/.github/workflows/reusable-build-poc.yml@v1
    with:
      service_name: payments

  deploy-dev:
    needs: build
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: dev
      app_name: payments-dev
      version: ${{ needs.build.outputs.version }}

  deploy-staging:
    needs: [build, deploy-dev]
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: staging
      app_name: payments-staging
      version: ${{ needs.build.outputs.version }}

  release:
    needs: build
    uses: mbeema/platform-pipelines/.github/workflows/reusable-release.yml@v1
    with:
      service_name: payments
    secrets: inherit

  bump-staging-ledger:
    needs: [build, deploy-staging, release]
    uses: mbeema/platform-pipelines/.github/workflows/reusable-bump-ledger-poc.yml@v1
    with:
      service_name: payments
      version: ${{ needs.build.outputs.version }}
      semver: ${{ needs.release.outputs.semver }}
      environment: staging
    secrets: inherit
