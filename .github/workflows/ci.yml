# =============================================================================
# SERVICE REPO — THIN CALLER of the CENTRAL PIPELINE (mbeema/platform-pipelines@v1)
# Repo: mbeema/service-payments  (Function App / zip service)
#
# CI auto-releases to DEV ONLY. staging and prod are gated promotions run from
# platform-releases (release.yml) with required-reviewer approval.
#   build -> deploy-dev -> release (tag) -> bump DEV ledger
# =============================================================================
name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    uses: mbeema/platform-pipelines/.github/workflows/reusable-build-poc.yml@v1
    with:
      service_name: payments

  deploy-dev:
    needs: build
    uses: mbeema/platform-pipelines/.github/workflows/reusable-deploy-poc.yml@v1
    with:
      environment: dev
      app_name: payments-dev
      version: ${{ needs.build.outputs.version }}

  release:
    needs: build
    uses: mbeema/platform-pipelines/.github/workflows/reusable-release.yml@v1
    with:
      service_name: payments
    secrets: inherit

  bump-dev-ledger:
    needs: [build, deploy-dev, release]
    uses: mbeema/platform-pipelines/.github/workflows/reusable-bump-ledger-poc.yml@v1
    with:
      service_name: payments
      version: ${{ needs.build.outputs.version }}
      semver: ${{ needs.release.outputs.semver }}
      environment: dev
    secrets: inherit

  # staging & prod are NOT here — release them from platform-releases:
  #   Actions -> release -> services=payments, environment=staging|prod  (approval required)
